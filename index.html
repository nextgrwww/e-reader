<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindle Reader Web</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Load Babel for JSX transpilation in the browser -->
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;600&display=swap');
        
        html, body, #root {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .animate-spin-slow { animation: spin 3s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* Kindle e-ink simulation styles */
        * { -webkit-tap-highlight-color: transparent; }
        .font-serif { font-family: 'Lora', Georgia, serif; }
        .font-sans { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- INLINE SVG ICONS (Replacing lucide-react) ---
        const IconWrapper = ({ size = 24, className = "", children }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const Wifi = (props) => <IconWrapper {...props}><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></IconWrapper>;
        const Battery = (props) => <IconWrapper {...props}><rect width="16" height="10" x="2" y="7" rx="2" ry="2"/><line x1="22" x2="22" y1="11" y2="13"/></IconWrapper>;
        const Search = (props) => <IconWrapper {...props}><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></IconWrapper>;
        const MoreVertical = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></IconWrapper>;
        const Settings = (props) => <IconWrapper {...props}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></IconWrapper>;
        const ChevronLeft = (props) => <IconWrapper {...props}><path d="m15 18-6-6 6-6"/></IconWrapper>;
        const Home = (props) => <IconWrapper {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></IconWrapper>;
        const BookOpen = (props) => <IconWrapper {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconWrapper>;
        const List = (props) => <IconWrapper {...props}><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></IconWrapper>;
        const Grid = (props) => <IconWrapper {...props}><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></IconWrapper>;
        const Type = (props) => <IconWrapper {...props}><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></IconWrapper>;
        const Moon = (props) => <IconWrapper {...props}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></IconWrapper>;
        const Sun = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></IconWrapper>;
        const Upload = (props) => <IconWrapper {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></IconWrapper>;
        const DownloadCloud = (props) => <IconWrapper {...props}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m8 17 4 4 4-4"/></IconWrapper>;
        const Columns = (props) => <IconWrapper {...props}><rect x="2" y="3" width="20" height="18" rx="2" ry="2"/><line x1="12" y1="3" x2="12" y2="21"/></IconWrapper>;

        // --- INTELLIGENT WORD WISE ALGORITHM ---
        // A stop-list of highly common intermediate/long English words to ignore
        const COMMON_WORDS = new Set("people because should things always around another something between thought through nothing without against anything everything everyone someone understand important different information together beautiful themselves probably remember especially actually already although american anyway become before behind believe benefit business cannot certain certainly change character children common community company compare complete condition consider continue control country course create culture current customer daughter decide decision describe design determine develop difference difficult direct direction discover discuss disease doctor during economic economy education effect effort election energy enough environment establish evening evidence exactly example executive expect experience explain family federal feeling figure financial foreign former forward friend future general generation government ground happen health history hospital however husband include including increase indeed indicate individual industry inside instead institution interest international interview investment involve knowledge language lawyer letter likely listen little machine majority manage management manager market material matter measure medical meeting member memory message method middle military million minute mission moment morning mother movement nation national natural nature nearly necessary network number office officer official operation opportunity option organization others outside parent participant particular particularly partner patient pattern percent perform performance perhaps period person personal physical picture player police policy political politics popular population position positive possible practice prepare present president pressure pretty prevent private probably problem process produce product production professional professor program project property protect provide public purpose quality question quickly reason receive recent recently recognize record relate relationship religious remain remove report represent require research resource respond response responsibility result return reveal school science scientist season second section security senior series service several sexual should shoulder significant similar simple simply single sister situation social society soldier somebody sometimes source southern special specific speech spring standard statement station status street strong student studio system target teacher technology television theory therefore though throughout toward traditional training treatment trouble usually various weapon weight western whatever whether window within woman wonder worker would writer yourself".split(" "));

        const isDifficultWord = (word) => {
            const lowerWord = word.toLowerCase();
            if (lowerWord.length < 6) return false;
            if (COMMON_WORDS.has(lowerWord)) return false;
            
            // Syllable counting heuristic
            let w = lowerWord.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, ''); // Remove silent e, ed, es
            w = w.replace(/^y/, '');
            const syllables = w.match(/[aeiouy]{1,2}/g)?.length || 1;
            
            // Consider difficult if 3+ syllables or very long (9+) and not in common list
            return syllables >= 3 || lowerWord.length >= 9;
        };

        const STORAGE_KEY = 'kindle_web_data_v1';

        const dataURItoArrayBuffer = (dataURI) => {
            const byteString = atob(dataURI.split(',')[1]);
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            return ab;
        };


        // --- MOCK DATA ---
        const INITIAL_BOOKS = [
          { id: '1', title: 'The Great Gatsby', author: 'F. Scott Fitzgerald', format: 'epub', cover: 'https://images.unsplash.com/photo-1544947950-fa07a98d237f?auto=format&fit=crop&q=80&w=300&h=450', progress: 45 },
          { id: '2', title: '1984', author: 'George Orwell', format: 'pdf', cover: 'https://images.unsplash.com/photo-1524578974052-094fa8ec629e?auto=format&fit=crop&q=80&w=300&h=450', progress: 12 },
          { id: '3', title: 'Pride and Prejudice', author: 'Jane Austen', format: 'mobi', cover: 'https://images.unsplash.com/photo-1511108690759-009324a5033d?auto=format&fit=crop&q=80&w=300&h=450', progress: 88 },
          { id: '4', title: 'Dune', author: 'Frank Herbert', format: 'epub', cover: 'https://images.unsplash.com/photo-1541963463532-d68292c34b19?auto=format&fit=crop&q=80&w=300&h=450', progress: 0 },
        ];

        function App() {
          const [view, setView] = useState('library'); // 'home', 'library', 'reader'
          
          const [books, setBooks] = useState(() => {
              const saved = localStorage.getItem(STORAGE_KEY);
              if (saved) {
                  try {
                      return JSON.parse(saved).books || INITIAL_BOOKS;
                  } catch(e) {}
              }
              return INITIAL_BOOKS;
          });
          const [currentBook, setCurrentBook] = useState(null);
          
          // Kindle Settings
          const [time, setTime] = useState(new Date());
          const [isDarkMode, setIsDarkMode] = useState(false);
          const [libraryViewType, setLibraryViewType] = useState('grid');
          const [menuOpen, setMenuOpen] = useState(false);
          const [aaMenuOpen, setAaMenuOpen] = useState(false);
          
          // Display Layout Settings
          const [isLandscape, setIsLandscape] = useState(window.innerWidth > window.innerHeight);
          const [twoPageView, setTwoPageView] = useState(() => {
              const saved = localStorage.getItem(STORAGE_KEY);
              if (saved) {
                  try {
                      return JSON.parse(saved).twoPageView || false;
                  } catch(e) {}
              }
              return false;
          });
          
          // Word Wise Settings
          const [wordWiseData, setWordWiseData] = useState(() => {
              const saved = localStorage.getItem(STORAGE_KEY);
              if (saved) {
                  try {
                      return JSON.parse(saved).wordWiseData || {};
                  } catch(e) {}
              }
              return {};
          });
          const [wordWiseEnabled, setWordWiseEnabled] = useState(false);
          const [autoWordWiseEnabled, setAutoWordWiseEnabled] = useState(false);
          const wordWiseRef = useRef({ data: {}, enabled: false, autoEnabled: false });
          const attemptedWordsRef = useRef({});
          
          const currentBookRef = useRef(null);
          const savedLocationRef = useRef(null);
          const bookRef = useRef(null);

          // Reader Settings
          const [readerSettings, setReaderSettings] = useState({
            fontSize: 100, // percentage
            fontFamily: 'ui-serif, Georgia, serif', // Default Bookerly-ish
            margin: 40,
          });

          // External Library States
          const [epubLoaded, setEpubLoaded] = useState(false);
          const renditionRef = useRef(null);
          const viewerRef = useRef(null);
          const fileInputRef = useRef(null);
          const wordWiseFileInputRef = useRef(null);

          // Listen for Orientation/Resize Changes
          useEffect(() => {
              const handleResize = () => setIsLandscape(window.innerWidth > window.innerHeight);
              window.addEventListener('resize', handleResize);
              return () => window.removeEventListener('resize', handleResize);
          }, []);

          // Persist Data to LocalStorage automatically
          useEffect(() => {
              const data = { books, wordWiseData, twoPageView };
              try {
                  // Save everything, including Base64 files, to a single JSON string
                  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
              } catch (e) {
                  console.warn("Storage full. Saving metadata without files.", e);
                  try {
                      // If quota exceeds (5MB limit), strip huge file payloads but keep library metadata & words
                      const strippedBooks = books.map(b => ({...b, fileData: null}));
                      localStorage.setItem(STORAGE_KEY, JSON.stringify({books: strippedBooks, wordWiseData, twoPageView}));
                  } catch(e2) {}
              }
          }, [books, wordWiseData, twoPageView]);

          // Global Keyboard Navigation for Arrow Keys
          useEffect(() => {
              const handleKeyDown = (e) => {
                  if (view !== 'reader' || !renditionRef.current) return;
                  if (e.key === 'ArrowLeft') renditionRef.current.prev();
                  if (e.key === 'ArrowRight') renditionRef.current.next();
              };
              window.addEventListener('keydown', handleKeyDown);
              return () => window.removeEventListener('keydown', handleKeyDown);
          }, [view]);

          // Keep refs synced for epub.js hooks to access latest state without stale closures
          useEffect(() => {
            wordWiseRef.current = { data: wordWiseData, enabled: wordWiseEnabled, autoEnabled: autoWordWiseEnabled };
            currentBookRef.current = currentBook;
          }, [wordWiseData, wordWiseEnabled, autoWordWiseEnabled, currentBook]);

          // Load epub.js dynamically
          useEffect(() => {
            const loadScript = (src) => new Promise(resolve => {
              if (document.querySelector(`script[src="${src}"]`)) return resolve();
              const s = document.createElement('script');
              s.src = src;
              s.onload = resolve;
              document.head.appendChild(s);
            });

            Promise.all([
              loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js')
            ])
            .then(() => loadScript('https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js'))
            .then(() => setEpubLoaded(true))
            .catch(err => console.error("Failed to load epub.js", err));
          }, []);

          // Update Top Bar Time
          useEffect(() => {
            const timer = setInterval(() => setTime(new Date()), 60000);
            return () => clearInterval(timer);
          }, []);

          const openBook = (book) => {
            setCurrentBook(book);
            setView('reader');
            setMenuOpen(false);
            setAaMenuOpen(false);
            savedLocationRef.current = null;
            if (bookRef.current) {
                bookRef.current.destroy();
                bookRef.current = null;
            }
          };

          const closeReader = () => {
            if (renditionRef.current) {
              renditionRef.current.destroy();
              renditionRef.current = null;
            }
            if (bookRef.current) {
              bookRef.current.destroy();
              bookRef.current = null;
            }
            setView('library');
            setCurrentBook(null);
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const ext = file.name.split('.').pop().toLowerCase();
            const reader = new FileReader();
            
            reader.onload = (event) => {
              const dataUrl = event.target.result;
              const newBook = {
                id: Math.random().toString(36).substr(2, 9),
                title: file.name.replace(`.${ext}`, ''),
                author: 'Unknown Author',
                format: ext,
                fileData: dataUrl,
                cover: null,
                progress: 0
              };

              setBooks(prev => [newBook, ...prev]);
              openBook(newBook);
            };
            
            reader.readAsDataURL(file); // Encode file to persist natively in local storage without Blob refs
          };

          const handleWordWiseUpload = (e) => {
            const file = e.target.files[0];
            if (!file || !currentBook) return;

            const reader = new FileReader();
            reader.onload = (event) => {
              try {
                const json = JSON.parse(event.target.result);
                // Normalize keys to lowercase for matching
                const normalizedJson = {};
                for (const key in json) {
                  normalizedJson[key.toLowerCase()] = json[key];
                }
                
                setWordWiseData(prev => ({...prev, [currentBook.id]: normalizedJson}));
                setWordWiseEnabled(true);
                
                // Manually trigger refresh to apply the newly uploaded dictionary
                setTimeout(() => {
                   if (renditionRef.current && renditionRef.current.location) {
                     try { renditionRef.current.display(renditionRef.current.location.start.cfi); } catch(e){}
                   }
                }, 100);
              } catch (err) {
                console.error("Invalid Word Wise JSON", err);
                alert("Invalid JSON file format. Please upload a key-value dictionary.");
              }
            };
            reader.readAsText(file);
            e.target.value = null;
          };

          const applyWordWiseToContents = (contents, dictionary) => {
            const doc = contents.document;
            if (!doc || !dictionary || Object.keys(dictionary).length === 0) return;

            // Inject styles for Word Wise (ruby tags)
            const styleId = 'word-wise-style';
            if (!doc.getElementById(styleId)) {
              const style = doc.createElement('style');
              style.id = styleId;
              style.textContent = `
                body { line-height: 2 !important; } /* Make room for annotations */
                ruby.word-wise { ruby-align: center; }
                rt.word-wise-def {
                  font-size: 0.55em;
                  opacity: 0.6;
                  color: inherit;
                  font-family: sans-serif;
                  font-weight: normal;
                  user-select: none;
                }
              `;
              doc.head.appendChild(style);
            }

            // Build highly optimized Regex for all dictionary words
            const words = Object.keys(dictionary).sort((a, b) => b.length - a.length);
            const escapeRegExp = (str) => str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const pattern = new RegExp(`\\b(${words.map(escapeRegExp).join('|')})\\b`, 'gi');

            // Walk through all text nodes
            const walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT, {
              acceptNode: function(node) {
                const parentName = node.parentNode.nodeName;
                // Skip nodes we've already processed or structural tags
                if (parentName === 'RT' || parentName === 'RUBY' || parentName === 'SCRIPT' || parentName === 'STYLE') {
                  return NodeFilter.FILTER_REJECT;
                }
                return NodeFilter.FILTER_ACCEPT;
              }
            });

            const nodesToReplace = [];
            let node;
            while ((node = walker.nextNode())) {
              if (pattern.test(node.nodeValue)) {
                nodesToReplace.push(node);
              }
            }

            // Process matching text nodes
            nodesToReplace.forEach(textNode => {
              const text = textNode.nodeValue;
              const fragment = doc.createDocumentFragment();
              let lastIndex = 0;
              pattern.lastIndex = 0;
              let match;

              while ((match = pattern.exec(text)) !== null) {
                const matchedWord = match[0];
                const definition = dictionary[matchedWord.toLowerCase()];
                
                if (definition) {
                  if (match.index > lastIndex) {
                    fragment.appendChild(doc.createTextNode(text.substring(lastIndex, match.index)));
                  }

                  const ruby = doc.createElement('ruby');
                  ruby.className = 'word-wise';
                  ruby.appendChild(doc.createTextNode(matchedWord));
                  
                  const rt = doc.createElement('rt');
                  rt.className = 'word-wise-def';
                  rt.textContent = definition;
                  ruby.appendChild(rt);
                  
                  fragment.appendChild(ruby);
                  lastIndex = pattern.lastIndex;
                }
              }

              if (lastIndex < text.length) {
                fragment.appendChild(doc.createTextNode(text.substring(lastIndex)));
              }
              textNode.parentNode.replaceChild(fragment, textNode);
            });
          };

          const autoFetchWordWise = async (contents, bookId) => {
            const doc = contents.document;
            if (!doc) return;

            const text = doc.body.textContent || "";
            // Find alphabetic words 6+ characters long
            const matches = text.match(/\b[a-zA-Z]{6,}\b/g) || [];
            const uniqueWords = [...new Set(matches.map(w => w.toLowerCase()))];

            if (!attemptedWordsRef.current[bookId]) {
              attemptedWordsRef.current[bookId] = new Set();
            }
            const attempted = attemptedWordsRef.current[bookId];
            const currentDict = wordWiseRef.current.data[bookId] || {};

            // Filter out words using our new clever heuristic algorithm
            const wordsToFetch = uniqueWords.filter(w => 
              !attempted.has(w) && 
              !currentDict[w] && 
              isDifficultWord(w)
            );

            if (wordsToFetch.length === 0) return;

            // Fetch up to 6 intelligently filtered words per page/chapter load
            const slice = wordsToFetch.slice(0, 6);
            slice.forEach(w => attempted.add(w));

            let newDefs = {};
            let fetchedAny = false;

            // Fetch definitions from free dictionary API
            await Promise.all(slice.map(async (word) => {
              try {
                const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                if (res.ok) {
                  const json = await res.json();
                  const def = json[0]?.meanings[0]?.definitions[0]?.definition;
                  if (def) {
                    // Shorten the definition to fit above the text gracefully
                    let shortDef = def.split(' ').slice(0, 4).join(' ');
                    if (def.split(' ').length > 4) shortDef += '...';
                    newDefs[word] = shortDef;
                    fetchedAny = true;
                  }
                }
              } catch (e) {
                console.error("Auto WW fetch failed for", word);
              }
            }));

            if (fetchedAny) {
              setWordWiseData(prev => ({
                ...prev,
                [bookId]: { ...(prev[bookId] || {}), ...newDefs }
              }));
              
              // Apply inline immediately to avoid a full page reload flash
              if (wordWiseRef.current.enabled) {
                applyWordWiseToContents(contents, newDefs);
              }
            }
          };

          // EPUB Rendering logic
          useEffect(() => {
            if (view === 'reader' && currentBook && currentBook.format === 'epub' && epubLoaded && viewerRef.current) {
              // Don't try to render mock books without a real file
              if (!currentBook.fileData) return;

              const renderBook = async () => {
                try {
                  // Save current location before rebuilding rendition on layout change
                  let initialLocation = savedLocationRef.current;
                  if (renditionRef.current) {
                      if (renditionRef.current.location && renditionRef.current.location.start) {
                          initialLocation = renditionRef.current.location.start.cfi;
                      }
                      renditionRef.current.destroy();
                      renditionRef.current = null;
                  }

                  // Load ArrayBuffer only once per book opening
                  if (!bookRef.current) {
                      const arrayBuffer = dataURItoArrayBuffer(currentBook.fileData);
                      bookRef.current = window.ePub(arrayBuffer); 
                  }

                  // Dynamically resolve spreading
                  const spreadMode = (isLandscape && twoPageView) ? 'auto' : 'none';

                  const rendition = bookRef.current.renderTo(viewerRef.current, {
                    width: '100%',
                    height: '100%',
                    spread: spreadMode,
                    manager: 'continuous',
                    flow: 'paginated',
                    minSpreadWidth: (isLandscape && twoPageView) ? 1 : 800 // Force spread layout if enabled
                  });

                  // Restore location if changing orientation/settings
                  if (initialLocation) {
                      rendition.display(initialLocation);
                  } else {
                      rendition.display();
                  }
                  
                  // Register Themes
                  rendition.themes.register("light", { "body": { "background": "#f4f4f4", "color": "#111111" }});
                  rendition.themes.register("dark", { "body": { "background": "#111111", "color": "#f4f4f4" }});
                  
                  renditionRef.current = rendition;

                  // Apply initial settings
                  rendition.themes.fontSize(`${readerSettings.fontSize}%`);
                  rendition.themes.font(readerSettings.fontFamily);
                  rendition.themes.select(isDarkMode ? 'dark' : 'light');

                  // Hook to apply Word Wise on every new chapter/page load
                  rendition.hooks.content.register((contents) => {
                     const { data, enabled, autoEnabled } = wordWiseRef.current;
                     const bookId = currentBookRef.current?.id;
                     if (!bookId) return;

                     if (enabled && data[bookId]) {
                        applyWordWiseToContents(contents, data[bookId]);
                     }
                     if (autoEnabled) {
                        autoFetchWordWise(contents, bookId);
                     }
                  });

                  rendition.on('relocated', (location) => {
                      savedLocationRef.current = location.start.cfi;
                  });

                  // Kindle tap zones implementation (Menu ONLY, no flip on click)
                  rendition.on('click', (e) => {
                    const height = window.innerHeight;
                    const y = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);

                    if (y < height * 0.15) {
                      // Top 15% taps open menu
                      setMenuOpen(prev => !prev);
                      setAaMenuOpen(false);
                    }
                  });

                  // Setup touch events for iframe (Swipe)
                  rendition.on('touchstart', (e) => {
                     rendition.touchStartX = e.changedTouches[0].screenX;
                  });
                  rendition.on('touchend', (e) => {
                     const touchEndX = e.changedTouches[0].screenX;
                     if (rendition.touchStartX - touchEndX > 50) rendition.next(); // swipe left
                     if (rendition.touchStartX - touchEndX < -50) rendition.prev(); // swipe right
                  });
                  
                  // Setup Keyboard inside iframe
                  rendition.on('keyup', (e) => {
                      if (e.key === 'ArrowLeft') rendition.prev();
                      if (e.key === 'ArrowRight') rendition.next();
                  });

                  // Long press / Tap and Hold for Word Wise (Native text selection triggers this)
                  rendition.on('selected', async (cfiRange, contents) => {
                      const text = rendition.getRange(cfiRange).toString().trim();
                      // Clear selection immediately to mimic app behavior
                      contents.window.getSelection().removeAllRanges();

                      if (!text || text.includes(' ') || text.length < 2) return;
                      
                      const cleanWord = text.replace(/[^a-zA-Z]/g, '').toLowerCase();
                      const bookId = currentBookRef.current?.id;
                      
                      if (cleanWord.length < 2 || !bookId) return;

                      try {
                          const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${cleanWord}`);
                          if (res.ok) {
                              const json = await res.json();
                              const def = json[0]?.meanings[0]?.definitions[0]?.definition;
                              if (def) {
                                  let shortDef = def.split(' ').slice(0, 4).join(' ');
                                  if (def.split(' ').length > 4) shortDef += '...';
                                  
                                  const newDefs = { [cleanWord]: shortDef };
                                  
                                  setWordWiseData(prev => ({
                                      ...prev,
                                      [bookId]: { ...(prev[bookId] || {}), ...newDefs }
                                  }));
                                  
                                  setWordWiseEnabled(true);
                                  applyWordWiseToContents(contents, newDefs);
                              }
                          }
                      } catch (e) {
                          console.error("Tap & Hold WW fetch failed", e);
                      }
                  });

                } catch (err) {
                  console.error("EPUB render error:", err);
                }
              };

              renderBook();
            }
          }, [view, currentBook, epubLoaded, isLandscape, twoPageView]);

          // Apply Reader Settings Dynamically
          useEffect(() => {
            if (renditionRef.current && currentBook?.format === 'epub' && currentBook?.fileData) {
              const { themes } = renditionRef.current;
              themes.fontSize(`${readerSettings.fontSize}%`);
              themes.font(readerSettings.fontFamily);
              themes.select(isDarkMode ? 'dark' : 'light');
            }
          }, [readerSettings, isDarkMode, currentBook]);

          // Force re-render of the current page ONLY when Word Wise toggle changes
          useEffect(() => {
            if (renditionRef.current && epubLoaded && currentBook?.fileData && renditionRef.current.location) {
               try {
                 const currentLocation = renditionRef.current.location.start.cfi;
                 if (currentLocation) renditionRef.current.display(currentLocation);
               } catch (err) {
                 console.error("Failed to refresh location for Word Wise toggle", err);
               }
            }
          }, [wordWiseEnabled]); // Removed wordWiseData dependency to prevent infinite loops during auto-fetch

          // Handle Auto Word Wise Toggle activation
          useEffect(() => {
            if (autoWordWiseEnabled && currentBook?.fileData && renditionRef.current?.location) {
               setWordWiseEnabled(true); // Ensure main word wise is on
               
               // Trigger fetch on currently active contents immediately
               const contents = renditionRef.current.getContents()[0];
               if (contents && currentBook.id) {
                   autoFetchWordWise(contents, currentBook.id);
               }
            }
          }, [autoWordWiseEnabled]);

          // Handle generic tap for non-epub views
          const handleGenericReaderTap = (e) => {
            if (currentBook?.format === 'epub' && currentBook?.fileData) return; // Handled by epub.js iframe
            const height = window.innerHeight;
            const y = e.clientY;
            if (y < height * 0.2) {
              setMenuOpen(!menuOpen);
              setAaMenuOpen(false);
            }
          };

          const getFormatDisplay = (book) => {
            if (book.format === 'epub') return 'EPUB';
            if (book.format === 'pdf') return 'PDF';
            if (book.format === 'mobi') return 'MOBI';
            if (book.format === 'azw3') return 'AZW3';
            return book.format.toUpperCase();
          };

          // --- UI COMPONENTS ---

          const TopSystemBar = () => (
            <div className={`flex justify-between items-center px-4 py-1 text-xs font-semibold select-none z-50
              ${isDarkMode ? 'bg-black text-gray-300 border-gray-800' : 'bg-white text-gray-800 border-gray-200'}
              ${view === 'reader' && !menuOpen ? 'hidden' : 'border-b relative'}
            `}>
              <div className="flex space-x-2 items-center">
                <span>{time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
              </div>
              <div className="flex space-x-3 items-center">
                <Wifi size={14} />
                <div className="flex items-center space-x-1">
                  <span>87%</span>
                  <Battery size={16} className="rotate-90" />
                </div>
              </div>
            </div>
          );

          const LibraryHeader = () => (
            <div className={`px-4 py-3 flex flex-col space-y-4 border-b ${isDarkMode ? 'border-gray-800 bg-black text-white' : 'border-gray-300 bg-white text-black'}`}>
              <div className="flex justify-between items-center">
                <div className="flex space-x-6 text-xl font-bold font-serif tracking-wide">
                  <button onClick={() => setView('home')} className={view === 'home' ? 'border-b-2 border-current' : 'text-gray-500'}>Home</button>
                  <button onClick={() => setView('library')} className={view === 'library' ? 'border-b-2 border-current' : 'text-gray-500'}>Library</button>
                </div>
                <div className="flex space-x-4">
                  <button><Search size={22} /></button>
                  <button><Settings size={22} /></button>
                  <button><MoreVertical size={22} /></button>
                </div>
              </div>

              {view === 'library' && (
                <div className="flex justify-between items-center text-sm font-semibold">
                  <div className="flex space-x-4">
                    <button className="flex items-center space-x-1 bg-gray-200 dark:bg-gray-800 px-3 py-1 rounded-full">
                      <span>All</span>
                    </button>
                    <button className="flex items-center space-x-1 px-3 py-1">
                      <span>Downloaded</span>
                    </button>
                  </div>
                  <div className="flex space-x-3 text-gray-500">
                    <button onClick={() => setLibraryViewType('grid')} className={libraryViewType === 'grid' ? 'text-current' : ''}><Grid size={20} /></button>
                    <button onClick={() => setLibraryViewType('list')} className={libraryViewType === 'list' ? 'text-current' : ''}><List size={20} /></button>
                  </div>
                </div>
              )}
            </div>
          );

          const LibraryView = () => (
            <div className={`flex-1 overflow-y-auto p-4 ${isDarkMode ? 'bg-[#111111]' : 'bg-[#f4f4f4]'}`}>
              <div className={libraryViewType === 'grid' 
                ? "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6" 
                : "flex flex-col space-y-4"}>
                
                {books.map((book) => (
                  <div 
                    key={book.id} 
                    onClick={() => openBook(book)}
                    className={`cursor-pointer group flex ${libraryViewType === 'list' ? 'flex-row space-x-4 items-center' : 'flex-col space-y-2'}`}
                  >
                    <div className={`relative ${libraryViewType === 'grid' ? 'w-full aspect-[2/3]' : 'w-20 h-30 flex-shrink-0'}`}>
                      {book.cover ? (
                        <img src={book.cover} alt={book.title} className="w-full h-full object-cover rounded shadow-sm border border-gray-300 dark:border-gray-700 grayscale contrast-125" />
                      ) : (
                        <div className="w-full h-full bg-gray-200 dark:bg-gray-800 rounded shadow-sm flex items-center justify-center p-2 text-center border border-gray-300 dark:border-gray-700">
                          <span className="font-serif text-sm font-bold truncate whitespace-normal">{book.title}</span>
                        </div>
                      )}
                      <div className="absolute bottom-0 left-0 right-0 bg-black/60 text-white text-[10px] px-2 py-1 flex justify-between">
                        <span>{book.progress}%</span>
                        <span className="uppercase font-bold">{getFormatDisplay(book)}</span>
                      </div>
                    </div>
                    <div className={`flex flex-col ${libraryViewType === 'grid' ? 'text-center' : 'flex-1'}`}>
                      <span className={`font-bold font-serif leading-tight ${isDarkMode ? 'text-white' : 'text-black'} ${libraryViewType === 'grid' ? 'text-sm mt-1 truncate' : 'text-lg'}`}>
                        {book.title}
                      </span>
                      <span className={`text-xs mt-1 ${isDarkMode ? 'text-gray-400' : 'text-gray-600'}`}>
                        {book.author}
                      </span>
                    </div>
                  </div>
                ))}
              </div>

              {/* Upload FAB */}
              <button 
                onClick={() => fileInputRef.current?.click()}
                className={`fixed bottom-6 right-6 p-4 rounded-full shadow-lg flex items-center justify-center
                  ${isDarkMode ? 'bg-white text-black hover:bg-gray-200' : 'bg-black text-white hover:bg-gray-800'}`}
              >
                <Upload size={24} />
              </button>
              <input 
                type="file" 
                ref={fileInputRef} 
                onChange={handleFileUpload} 
                accept=".epub,.pdf,.mobi,.azw3" 
                className="hidden" 
              />
            </div>
          );

          const ReaderOverlayMenu = () => (
            <div className={`absolute top-0 left-0 right-0 z-40 transition-transform duration-300 ${menuOpen ? 'translate-y-0' : '-translate-y-full'}`}>
              <div className={`${isDarkMode ? 'bg-[#1a1a1a] text-white border-gray-800' : 'bg-white text-black border-gray-200'} border-b shadow-md`}>
                <div className="flex justify-between items-center px-4 py-3">
                  <button onClick={closeReader} className="flex items-center space-x-2 text-xl font-serif">
                    <ChevronLeft size={28} />
                    <span>Library</span>
                  </button>
                  
                  <div className="flex space-x-6 items-center">
                    <button onClick={() => setIsDarkMode(!isDarkMode)}>
                      {isDarkMode ? <Sun size={24} /> : <Moon size={24} />}
                    </button>
                    <button onClick={() => setAaMenuOpen(!aaMenuOpen)} className="font-serif font-bold text-xl px-2 border border-current rounded">
                      Aa
                    </button>
                    <button><Search size={24} /></button>
                    <button><MoreVertical size={24} /></button>
                  </div>
                </div>

                {/* Aa Menu */}
                {aaMenuOpen && (
                  <div className={`p-4 border-t ${isDarkMode ? 'border-gray-800' : 'border-gray-200'}`}>
                    <div className="flex flex-col space-y-6 max-w-md mx-auto">
                      
                      {/* Font Size */}
                      <div className="flex items-center justify-between space-x-4">
                        <Type size={16} />
                        <input 
                          type="range" 
                          min="50" max="200" step="10"
                          value={readerSettings.fontSize}
                          onChange={(e) => setReaderSettings({...readerSettings, fontSize: e.target.value})}
                          className="w-full h-1 bg-gray-300 rounded-lg appearance-none cursor-pointer"
                        />
                        <Type size={24} />
                      </div>

                      {/* Font Family */}
                      <div className="grid grid-cols-2 gap-3">
                        <button 
                          onClick={() => setReaderSettings({...readerSettings, fontFamily: 'ui-serif, Georgia, serif'})}
                          className={`p-2 border rounded font-serif ${readerSettings.fontFamily.includes('serif') ? (isDarkMode ? 'bg-white text-black' : 'bg-black text-white') : (isDarkMode ? 'border-gray-600' : 'border-gray-300')}`}
                        >
                          Bookerly
                        </button>
                        <button 
                          onClick={() => setReaderSettings({...readerSettings, fontFamily: 'ui-sans-serif, system-ui, sans-serif'})}
                          className={`p-2 border rounded font-sans ${readerSettings.fontFamily.includes('sans') ? (isDarkMode ? 'bg-white text-black' : 'bg-black text-white') : (isDarkMode ? 'border-gray-600' : 'border-gray-300')}`}
                        >
                          Amazon Ember
                        </button>
                      </div>

                      {/* Display Layout Section */}
                      {isLandscape && (
                        <div className={`mt-4 pt-4 border-t ${isDarkMode ? 'border-gray-800' : 'border-gray-200'}`}>
                          <div className="flex items-center justify-between">
                            <div className="flex items-center space-x-2">
                              <Columns size={16} />
                              <span className="font-bold text-sm">Two-Page View</span>
                            </div>
                            <button 
                              onClick={() => setTwoPageView(!twoPageView)}
                              className={`w-11 h-6 rounded-full relative transition-colors ${twoPageView ? 'bg-black dark:bg-white' : 'bg-gray-300 dark:bg-gray-700'}`}
                            >
                              <div className={`w-4 h-4 rounded-full bg-white dark:bg-black absolute top-1 transition-transform ${twoPageView ? 'translate-x-6' : 'translate-x-1'}`} />
                            </button>
                          </div>
                        </div>
                      )}

                      {/* Word Wise Section */}
                      <div className={`mt-4 pt-4 border-t ${isDarkMode ? 'border-gray-800' : 'border-gray-200'}`}>
                        <div className="flex items-center justify-between mb-3">
                          <div className="flex items-center space-x-2">
                            <BookOpen size={16} />
                            <span className="font-bold text-sm">Show Word Wise</span>
                          </div>
                          <button 
                            onClick={() => setWordWiseEnabled(!wordWiseEnabled)}
                            className={`w-11 h-6 rounded-full relative transition-colors ${wordWiseEnabled ? 'bg-black dark:bg-white' : 'bg-gray-300 dark:bg-gray-700'}`}
                          >
                            <div className={`w-4 h-4 rounded-full bg-white dark:bg-black absolute top-1 transition-transform ${wordWiseEnabled ? 'translate-x-6' : 'translate-x-1'}`} />
                          </button>
                        </div>

                        <div className="flex items-center justify-between mb-4">
                          <div className="flex items-center space-x-2">
                            <DownloadCloud size={16} />
                            <span className="font-bold text-sm">Auto-Download Meanings</span>
                          </div>
                          <button 
                            onClick={() => setAutoWordWiseEnabled(!autoWordWiseEnabled)}
                            className={`w-11 h-6 rounded-full relative transition-colors ${autoWordWiseEnabled ? 'bg-black dark:bg-white' : 'bg-gray-300 dark:bg-gray-700'}`}
                          >
                            <div className={`w-4 h-4 rounded-full bg-white dark:bg-black absolute top-1 transition-transform ${autoWordWiseEnabled ? 'translate-x-6' : 'translate-x-1'}`} />
                          </button>
                        </div>
                        
                        <button 
                          onClick={() => wordWiseFileInputRef.current?.click()} 
                          className={`w-full text-xs p-2 border border-dashed rounded text-center cursor-pointer transition-colors ${isDarkMode ? 'border-gray-600 hover:bg-gray-800' : 'border-gray-400 hover:bg-gray-100'}`}
                        >
                          {wordWiseData[currentBook?.id] ? 'Dictionary Loaded (Upload to Replace)' : '+ Upload Dictionary (.json)'}
                        </button>
                        <input 
                          type="file" 
                          ref={wordWiseFileInputRef} 
                          accept=".json" 
                          className="hidden" 
                          onChange={handleWordWiseUpload} 
                        />
                      </div>

                    </div>
                  </div>
                )}
              </div>
            </div>
          );

          const NonEpubFallback = () => {
            if (!currentBook) return null;

            if (currentBook.format === 'epub' && !currentBook.fileData) {
              return (
                 <div className={`flex flex-col items-center justify-center h-full space-y-4 text-center p-8 ${isDarkMode ? 'text-gray-300' : 'text-gray-600'}`}>
                   <BookOpen size={48} className="text-gray-400 opacity-50 mb-4" />
                   <h2 className="text-2xl font-serif font-bold">Demo Book Placeholder</h2>
                   <p className="max-w-md text-lg">
                     This is a mock library item, or its file data could not be saved to local storage. To see the reading experience, please tap the <strong>+ Upload</strong> button on the Library screen to select an actual `.epub` file from your device.
                   </p>
                 </div>
              );
            }

            if (currentBook.format === 'pdf') {
              return (
                <div className="w-full h-full bg-white relative">
                  {currentBook.fileData ? (
                    <iframe src={`${currentBook.fileData}#toolbar=0&navpanes=0`} className="w-full h-full border-none" title="PDF Viewer" />
                  ) : (
                    <div className={`flex flex-col items-center justify-center h-full space-y-4 text-center p-8 ${isDarkMode ? 'text-gray-300 bg-[#111111]' : 'text-gray-600 bg-white'}`}>
                       <BookOpen size={48} className="text-gray-400" />
                       <h2 className="text-2xl font-serif">PDF Viewer</h2>
                       <p>Please upload a local PDF file to view it natively.</p>
                    </div>
                  )}
                </div>
              );
            }

            if (currentBook.format === 'mobi' || currentBook.format === 'azw3') {
              return (
                <div className={`flex flex-col items-center justify-center h-full space-y-6 text-center p-8
                  ${isDarkMode ? 'bg-[#111111] text-gray-300' : 'bg-[#f4f4f4] text-gray-800'}`}
                >
                  <div className="animate-pulse">
                    <Settings size={48} className="text-gray-400 animate-spin-slow" />
                  </div>
                  <h2 className="text-2xl font-serif font-bold">Whispersync Conversion Required</h2>
                  <p className="max-w-md text-lg">
                    Format <strong>.{currentBook.format.toUpperCase()}</strong> detected. <br/><br/>
                    On a physical Kindle, these proprietary formats are processed by Amazon's internal software. 
                    In this web simulation, robust client-side parsing for DRM/Amazon formats is unavailable.
                  </p>
                  <div className="p-4 border border-dashed border-gray-400 rounded-lg">
                    <p className="font-bold">Tip for this demo:</p>
                    <p>Convert your {currentBook.format.toUpperCase()} to <strong>EPUB</strong> using Calibre and upload the EPUB file for a flawless reading experience.</p>
                  </div>
                  <button onClick={closeReader} className="mt-8 px-6 py-2 border-2 border-current rounded-full font-bold hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
                    Return to Library
                  </button>
                </div>
              );
            }

            return null;
          };

          return (
            <div className={`flex flex-col w-full h-screen overflow-hidden selection:bg-gray-300 ${isDarkMode ? 'bg-[#111111] text-[#f4f4f4]' : 'bg-[#f4f4f4] text-[#111111]'}`}>
              <TopSystemBar />

              {view !== 'reader' ? (
                <React.Fragment>
                  <LibraryHeader />
                  <LibraryView />
                </React.Fragment>
              ) : (
                <div className="relative flex-1 flex flex-col w-full h-full overflow-hidden" onClick={handleGenericReaderTap}>
                  <ReaderOverlayMenu />
                  
                  <div className="flex-1 w-full h-full relative z-10">
                    {currentBook?.format === 'epub' && currentBook?.fileData ? (
                      <div ref={viewerRef} className="w-full h-full absolute inset-0" />
                    ) : (
                      <NonEpubFallback />
                    )}
                  </div>

                  {/* Bottom Reader Status */}
                  <div className={`absolute bottom-0 left-0 right-0 p-2 text-center text-xs font-serif font-semibold z-30 transition-opacity duration-300
                    ${menuOpen ? 'opacity-0' : 'opacity-100'}
                    ${isDarkMode ? 'text-gray-500 bg-gradient-to-t from-black to-transparent' : 'text-gray-500 bg-gradient-to-t from-[#f4f4f4] to-transparent'}
                  `}>
                    Page 1 • 2 mins left in chapter • {currentBook?.progress || 0}%
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
