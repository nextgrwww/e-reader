<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindle Reader Pro</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Load Babel for JSX transpilation in the browser -->
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;600&display=swap');
        
        html, body, #root {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .animate-spin-slow { animation: spin 3s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        /* Kindle e-ink simulation styles */
        * { -webkit-tap-highlight-color: transparent; }
        .font-serif { font-family: 'Lora', Georgia, serif; }
        .font-sans { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const IconWrapper = ({ size = 24, className = "", children }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const Wifi = (props) => <IconWrapper {...props}><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></IconWrapper>;
        const Battery = (props) => <IconWrapper {...props}><rect width="16" height="10" x="2" y="7" rx="2" ry="2"/><line x1="22" x2="22" y1="11" y2="13"/></IconWrapper>;
        const Search = (props) => <IconWrapper {...props}><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></IconWrapper>;
        const MoreVertical = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></IconWrapper>;
        const Settings = (props) => <IconWrapper {...props}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></IconWrapper>;
        const ChevronLeft = (props) => <IconWrapper {...props}><path d="m15 18-6-6 6-6"/></IconWrapper>;
        const ChevronUp = (props) => <IconWrapper {...props}><path d="m18 15-6-6-6 6"/></IconWrapper>;
        const ChevronDown = (props) => <IconWrapper {...props}><path d="m6 9 6 6 6-6"/></IconWrapper>;
        const Home = (props) => <IconWrapper {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></IconWrapper>;
        const BookOpen = (props) => <IconWrapper {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconWrapper>;
        const ListIcon = (props) => <IconWrapper {...props}><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></IconWrapper>;
        const Grid = (props) => <IconWrapper {...props}><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></IconWrapper>;
        const Type = (props) => <IconWrapper {...props}><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></IconWrapper>;
        const Moon = (props) => <IconWrapper {...props}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></IconWrapper>;
        const Sun = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></IconWrapper>;
        const Upload = (props) => <IconWrapper {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></IconWrapper>;
        const DownloadCloud = (props) => <IconWrapper {...props}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m8 17 4 4 4-4"/></IconWrapper>;
        const Columns = (props) => <IconWrapper {...props}><rect x="2" y="3" width="20" height="18" rx="2" ry="2"/><line x1="12" y1="3" x2="12" y2="21"/></IconWrapper>;
        const Notebook = (props) => <IconWrapper {...props}><path d="M2 6h4"/><path d="M2 10h4"/><path d="M2 14h4"/><path d="M2 18h4"/><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M16 2v20"/></IconWrapper>;
        const Palette = (props) => <IconWrapper {...props}><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></IconWrapper>;

        const COMMON_WORDS = new Set("people because should things always around another something between thought through nothing without against anything everything everyone someone understand important different information together beautiful themselves probably remember especially actually already although american anyway become before behind believe benefit business cannot certain certainly change character children common community company compare complete condition consider continue control country course create culture current customer daughter decide decision describe design determine develop difference difficult direct direction discover discuss disease doctor during economic economy education effect effort election energy enough environment establish evening evidence exactly example executive expect experience explain family federal feeling figure financial foreign former forward friend future general generation government ground happen health history hospital however husband include including increase indeed indicate individual industry inside instead institution interest international interview investment involve knowledge language lawyer letter likely listen little machine majority manage management manager market material matter measure medical meeting member memory message method middle military million minute mission moment morning mother movement nation national natural nature nearly necessary network number office officer official operation opportunity option organization others outside parent participant particular particularly partner patient pattern percent perform performance perhaps period person personal physical picture player police policy political politics popular population position positive possible practice prepare present president pressure pretty prevent private probably problem process produce product production professional professor program project property protect provide public purpose quality question quickly reason receive recent recently recognize record relate relationship religious remain remove report represent require research resource respond response responsibility result return reveal school science scientist season second section security senior series service several sexual should shoulder significant similar simple simply single sister situation social society soldier somebody sometimes source southern special specific speech spring standard statement station status street strong student studio system target teacher technology television theory therefore though throughout toward traditional training treatment trouble usually various weapon weight western whatever whether window within woman wonder worker would writer yourself".split(" "));

        const isDifficultWord = (word) => {
            const lowerWord = word.toLowerCase();
            if (lowerWord.length < 6) return false;
            if (COMMON_WORDS.has(lowerWord)) return false;
            let w = lowerWord.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '');
            w = w.replace(/^y/, '');
            const syllables = w.match(/[aeiouy]{1,2}/g)?.length || 1;
            return syllables >= 3 || lowerWord.length >= 9;
        };

        const STORAGE_KEY = 'kindle_web_data_v2';

        const dataURItoArrayBuffer = (dataURI) => {
            const byteString = atob(dataURI.split(',')[1]);
            const ab = new ArrayBuffer(byteString.length);
            const ia = new Uint8Array(ab);
            for (let i = 0; i < byteString.length; i++) {
                ia[i] = byteString.charCodeAt(i);
            }
            return ab;
        };

        const INITIAL_BOOKS = [
          { id: '1', title: 'The Great Gatsby', author: 'F. Scott Fitzgerald', format: 'epub', cover: 'https://images.unsplash.com/photo-1544947950-fa07a98d237f?auto=format&fit=crop&q=80&w=300&h=450', progress: 45 },
          { id: '2', title: '1984', author: 'George Orwell', format: 'pdf', cover: 'https://images.unsplash.com/photo-1524578974052-094fa8ec629e?auto=format&fit=crop&q=80&w=300&h=450', progress: 12 },
        ];

        function App() {
          // System & View State
          const [view, setView] = useState('library');
          const [time, setTime] = useState(new Date());
          const [libraryViewType, setLibraryViewType] = useState('grid');
          const [menuOpen, setMenuOpen] = useState(false);
          const [aaMenuOpen, setAaMenuOpen] = useState(false);
          const [isLandscape, setIsLandscape] = useState(window.innerWidth > window.innerHeight);

          // Deep Persisted State
          const [books, setBooks] = useState(INITIAL_BOOKS);
          const [currentBook, setCurrentBook] = useState(null);
          const [theme, setTheme] = useState('light'); // 'light', 'dark', 'sepia'
          const [twoPageView, setTwoPageView] = useState(false);
          const [wordWiseData, setWordWiseData] = useState({});
          const [bookmarks, setBookmarks] = useState({});
          const [characters, setCharacters] = useState({});
          const [wordWiseEnabled, setWordWiseEnabled] = useState(false);
          const [autoWordWiseEnabled, setAutoWordWiseEnabled] = useState(false);

          // Feature States
          const [contextMenu, setContextMenu] = useState(null); // {x, y, text, cfiRange}
          const [notebookOpen, setNotebookOpen] = useState(false);
          const [notebookTab, setNotebookTab] = useState('bookmarks'); // 'bookmarks', 'characters'
          const [searchResults, setSearchResults] = useState(null);
          const [isSearching, setIsSearching] = useState(false);

          // Refs
          const wordWiseRef = useRef({ data: {}, enabled: false, autoEnabled: false, theme: 'light' });
          const attemptedWordsRef = useRef({});
          const currentBookRef = useRef(null);
          const savedLocationRef = useRef(null);
          const bookRef = useRef(null);
          const renditionRef = useRef(null);
          const viewerRef = useRef(null);
          const fileInputRef = useRef(null);
          const wordWiseFileInputRef = useRef(null);
          const lastSelectionRef = useRef(null); // For context menu safety

          // Load Initial Data
          useEffect(() => {
              const saved = localStorage.getItem(STORAGE_KEY);
              if (saved) {
                  try {
                      const parsed = JSON.parse(saved);
                      if (parsed.books) setBooks(parsed.books);
                      if (parsed.theme) setTheme(parsed.theme);
                      if (parsed.twoPageView) setTwoPageView(parsed.twoPageView);
                      if (parsed.wordWiseData) setWordWiseData(parsed.wordWiseData);
                      if (parsed.bookmarks) setBookmarks(parsed.bookmarks);
                      if (parsed.characters) setCharacters(parsed.characters);
                  } catch(e) { console.error("Corrupted local storage", e); }
              }
          }, []);

          // Auto-Persist Data
          useEffect(() => {
              const data = { books, theme, twoPageView, wordWiseData, bookmarks, characters };
              try {
                  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
              } catch (e) {
                  console.warn("Storage full. Stripping files.");
                  try {
                      const strippedBooks = books.map(b => ({...b, fileData: null}));
                      localStorage.setItem(STORAGE_KEY, JSON.stringify({...data, books: strippedBooks}));
                  } catch(e2) {}
              }
          }, [books, theme, twoPageView, wordWiseData, bookmarks, characters]);

          // Resize Listener
          useEffect(() => {
              const handleResize = () => setIsLandscape(window.innerWidth > window.innerHeight);
              window.addEventListener('resize', handleResize);
              return () => window.removeEventListener('resize', handleResize);
          }, []);

          // Sync Refs for epub hooks
          useEffect(() => {
            wordWiseRef.current = { data: wordWiseData, enabled: wordWiseEnabled, autoEnabled: autoWordWiseEnabled, theme };
            currentBookRef.current = currentBook;
          }, [wordWiseData, wordWiseEnabled, autoWordWiseEnabled, theme, currentBook]);

          // Global Time & Load EPUB
          const [epubLoaded, setEpubLoaded] = useState(false);
          useEffect(() => {
            const timer = setInterval(() => setTime(new Date()), 60000);
            
            const loadScript = (src) => new Promise(resolve => {
              if (document.querySelector(`script[src="${src}"]`)) return resolve();
              const s = document.createElement('script');
              s.src = src;
              s.onload = resolve;
              document.head.appendChild(s);
            });

            Promise.all([loadScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js')])
            .then(() => loadScript('https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js'))
            .then(() => setEpubLoaded(true))
            .catch(err => console.error("Failed to load epub.js", err));

            return () => clearInterval(timer);
          }, []);

          // Global Keyboard Navigation
          useEffect(() => {
              const handleKeyDown = (e) => {
                  if (view !== 'reader' || !renditionRef.current || contextMenu || notebookOpen) return;
                  if (e.key === 'ArrowLeft') renditionRef.current.prev();
                  if (e.key === 'ArrowRight') renditionRef.current.next();
              };
              window.addEventListener('keydown', handleKeyDown);
              return () => window.removeEventListener('keydown', handleKeyDown);
          }, [view, contextMenu, notebookOpen]);

          const [readerSettings, setReaderSettings] = useState({
            fontSize: 100,
            fontFamily: 'ui-serif, Georgia, serif',
            margin: 40,
          });

          const getThemeStyles = () => {
              if (theme === 'dark') return { bg: 'bg-[#111111]', text: 'text-[#f4f4f4]', border: 'border-gray-800', menu: 'bg-[#1a1a1a] text-white', hover: 'hover:bg-gray-800', wwBg: '#1a1a1a', wwColor: '#f4f4f4' };
              if (theme === 'sepia') return { bg: 'bg-[#f4ecd8]', text: 'text-[#5b4636]', border: 'border-[#d4c8b8]', menu: 'bg-[#f4ecd8] text-[#5b4636]', hover: 'hover:bg-[#e4d8c8]', wwBg: '#e4d8c8', wwColor: '#5b4636' };
              return { bg: 'bg-[#f4f4f4]', text: 'text-[#111111]', border: 'border-gray-300', menu: 'bg-white text-black', hover: 'hover:bg-gray-200', wwBg: '#ffffff', wwColor: '#111111' };
          };
          const currentTheme = getThemeStyles();

          const openBook = (book) => {
            setCurrentBook(book);
            setView('reader');
            setMenuOpen(false);
            setAaMenuOpen(false);
            setNotebookOpen(false);
            savedLocationRef.current = null;
            if (bookRef.current) {
                bookRef.current.destroy();
                bookRef.current = null;
            }
          };

          const closeReader = () => {
            if (renditionRef.current) { renditionRef.current.destroy(); renditionRef.current = null; }
            if (bookRef.current) { bookRef.current.destroy(); bookRef.current = null; }
            setView('library');
            setCurrentBook(null);
            setContextMenu(null);
          };

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const ext = file.name.split('.').pop().toLowerCase();
            const reader = new FileReader();
            reader.onload = (event) => {
              const newBook = {
                id: Math.random().toString(36).substr(2, 9),
                title: file.name.replace(`.${ext}`, ''),
                author: 'Unknown Author',
                format: ext,
                fileData: event.target.result,
                cover: null,
                progress: 0
              };
              setBooks(prev => [newBook, ...prev]);
              openBook(newBook);
            };
            reader.readAsDataURL(file);
          };

          const handleContextMenuAction = (action) => {
              if (!contextMenu || !currentBook) return;
              
              if (action === 'copy') {
                  navigator.clipboard.writeText(contextMenu.text).catch(e => console.warn("Clipboard failed", e));
              } else if (action === 'bookmark') {
                  // Calculate rough percentage if available
                  let pct = 0;
                  try {
                      if (bookRef.current && bookRef.current.locations && bookRef.current.locations.length() > 0) {
                          pct = Math.round(bookRef.current.locations.percentageFromCfi(contextMenu.cfiRange) * 100);
                      }
                  } catch(e){}
                  
                  const newBookmark = { id: Date.now(), text: contextMenu.text, cfi: contextMenu.cfiRange, percentage: pct };
                  setBookmarks(prev => ({ ...prev, [currentBook.id]: [...(prev[currentBook.id] || []), newBookmark] }));
              } else if (action === 'character') {
                  const charName = contextMenu.text;
                  setCharacters(prev => {
                      const exist = prev[currentBook.id] || [];
                      if (!exist.includes(charName)) return { ...prev, [currentBook.id]: [...exist, charName] };
                      return prev;
                  });
              }
              setContextMenu(null);
              // Ensure selection is cleared natively so it doesn't linger
              try { renditionRef.current.getContents()[0].window.getSelection().removeAllRanges(); } catch(e){}
          };

          const searchCharacter = async (charName) => {
              setIsSearching(true);
              setSearchResults([]);
              try {
                  const results = [];
                  const spine = bookRef.current.spine;
                  for (let i = 0; i < spine.length; i++) {
                      const item = spine.get(i);
                      await item.load(bookRef.current.load.bind(bookRef.current));
                      const matches = item.find(charName);
                      if (matches && matches.length) {
                          results.push(...matches);
                      }
                      item.unload(); // Critical to prevent OOM
                  }
                  setSearchResults(results);
              } catch (e) {
                  console.error("Search failed", e);
              }
              setIsSearching(false);
          };

          const applyWordWiseToContents = (contents, dictionary) => {
            const doc = contents.document;
            if (!doc || !dictionary || Object.keys(dictionary).length === 0) return;

            const styleId = 'word-wise-style';
            let style = doc.getElementById(styleId);
            if (!style) {
              style = doc.createElement('style');
              style.id = styleId;
              doc.head.appendChild(style);
            }
            
            // The tooltip CSS is injected dynamically to respond to themes
            style.textContent = `
              body { line-height: 2 !important; }
              ruby.word-wise { position: relative; cursor: pointer; }
              rt.word-wise-def {
                font-size: 0.55em; opacity: 0.8; color: inherit; font-family: sans-serif; font-weight: normal; user-select: none;
                display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
              }
              /* Hover expansion logic */
              ruby.word-wise:hover rt.word-wise-def, ruby.word-wise:active rt.word-wise-def {
                white-space: normal; overflow: visible; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
                background-color: var(--ww-bg, #fff); color: var(--ww-color, #000); padding: 4px 6px; border-radius: 4px; 
                border: 1px solid var(--ww-color, #000); z-index: 9999; width: max-content; max-width: 180px;
                box-shadow: 0 4px 6px rgba(0,0,0,0.2); font-size: 0.65rem; line-height: 1.2; text-align: center;
              }
            `;

            // Inject theme variables
            const { theme } = wordWiseRef.current;
            const bg = theme === 'dark' ? '#1a1a1a' : theme === 'sepia' ? '#e4d8c8' : '#ffffff';
            const color = theme === 'dark' ? '#f4f4f4' : theme === 'sepia' ? '#5b4636' : '#111111';
            doc.documentElement.style.setProperty('--ww-bg', bg);
            doc.documentElement.style.setProperty('--ww-color', color);

            const words = Object.keys(dictionary).sort((a, b) => b.length - a.length);
            const escapeRegExp = (str) => str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const pattern = new RegExp(`\\b(${words.map(escapeRegExp).join('|')})\\b`, 'gi');

            const walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT, {
              acceptNode: function(node) {
                const p = node.parentNode.nodeName;
                if (p === 'RT' || p === 'RUBY' || p === 'SCRIPT' || p === 'STYLE') return NodeFilter.FILTER_REJECT;
                return NodeFilter.FILTER_ACCEPT;
              }
            });

            const nodesToReplace = [];
            let node;
            while ((node = walker.nextNode())) { if (pattern.test(node.nodeValue)) nodesToReplace.push(node); }

            nodesToReplace.forEach(textNode => {
              const text = textNode.nodeValue;
              const fragment = doc.createDocumentFragment();
              let lastIndex = 0; pattern.lastIndex = 0; let match;

              while ((match = pattern.exec(text)) !== null) {
                const matchedWord = match[0];
                const definition = dictionary[matchedWord.toLowerCase()];
                if (definition) {
                  if (match.index > lastIndex) fragment.appendChild(doc.createTextNode(text.substring(lastIndex, match.index)));
                  const ruby = doc.createElement('ruby');
                  ruby.className = 'word-wise';
                  ruby.appendChild(doc.createTextNode(matchedWord));
                  const rt = doc.createElement('rt');
                  rt.className = 'word-wise-def';
                  rt.textContent = definition;
                  ruby.appendChild(rt);
                  fragment.appendChild(ruby);
                  lastIndex = pattern.lastIndex;
                }
              }
              if (lastIndex < text.length) fragment.appendChild(doc.createTextNode(text.substring(lastIndex)));
              textNode.parentNode.replaceChild(fragment, textNode);
            });
          };

          const autoFetchWordWise = async (contents, bookId) => {
            const doc = contents.document;
            if (!doc) return;
            const text = doc.body.textContent || "";
            const matches = text.match(/\b[a-zA-Z]{6,}\b/g) || [];
            const uniqueWords = [...new Set(matches.map(w => w.toLowerCase()))];

            if (!attemptedWordsRef.current[bookId]) attemptedWordsRef.current[bookId] = new Set();
            const attempted = attemptedWordsRef.current[bookId];
            const currentDict = wordWiseRef.current.data[bookId] || {};

            const wordsToFetch = uniqueWords.filter(w => !attempted.has(w) && !currentDict[w] && isDifficultWord(w));
            if (wordsToFetch.length === 0) return;

            const slice = wordsToFetch.slice(0, 5);
            slice.forEach(w => attempted.add(w));

            let newDefs = {};
            let fetchedAny = false;

            await Promise.all(slice.map(async (word) => {
              try {
                const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                if (res.ok) {
                  const json = await res.json();
                  const def = json[0]?.meanings[0]?.definitions[0]?.definition;
                  if (def) {
                    newDefs[word] = def; // Store full definition for hover state
                    fetchedAny = true;
                  }
                }
              } catch (e) { console.error("Auto WW fetch failed", word); }
            }));

            if (fetchedAny) {
              setWordWiseData(prev => {
                  const updated = { ...prev, [bookId]: { ...(prev[bookId] || {}), ...newDefs } };
                  // Apply inline dynamically after state update
                  if (wordWiseRef.current.enabled) {
                      setTimeout(() => applyWordWiseToContents(contents, updated[bookId]), 50);
                  }
                  return updated;
              });
            }
          };

          useEffect(() => {
            if (view === 'reader' && currentBook && currentBook.format === 'epub' && epubLoaded && viewerRef.current) {
              if (!currentBook.fileData) return;

              const renderBook = async () => {
                try {
                  let initialLocation = savedLocationRef.current;
                  if (renditionRef.current) {
                      if (renditionRef.current.location && renditionRef.current.location.start) {
                          initialLocation = renditionRef.current.location.start.cfi;
                      }
                      renditionRef.current.destroy();
                      renditionRef.current = null;
                  }

                  if (!bookRef.current) {
                      const arrayBuffer = dataURItoArrayBuffer(currentBook.fileData);
                      bookRef.current = window.ePub(arrayBuffer); 
                      // Generate locations for Bookmarks in background
                      bookRef.current.ready.then(() => bookRef.current.locations.generate(1600)).catch(()=>{});
                  }

                  const spreadMode = (isLandscape && twoPageView) ? 'auto' : 'none';
                  const rendition = bookRef.current.renderTo(viewerRef.current, {
                    width: '100%', height: '100%', spread: spreadMode, manager: 'continuous', flow: 'paginated', minSpreadWidth: (isLandscape && twoPageView) ? 1 : 800
                  });

                  rendition.display(initialLocation || undefined);
                  
                  rendition.themes.register("light", { "body": { "background": "#f4f4f4", "color": "#111111" }});
                  rendition.themes.register("dark", { "body": { "background": "#111111", "color": "#f4f4f4" }});
                  rendition.themes.register("sepia", { "body": { "background": "#f4ecd8", "color": "#5b4636" }});
                  renditionRef.current = rendition;

                  rendition.themes.fontSize(`${readerSettings.fontSize}%`);
                  rendition.themes.font(readerSettings.fontFamily);
                  rendition.themes.select(theme);

                  rendition.hooks.content.register((contents) => {
                     const { data, enabled, autoEnabled } = wordWiseRef.current;
                     const bookId = currentBookRef.current?.id;
                     if (!bookId) return;

                     // Context Menu Injection
                     contents.document.addEventListener('contextmenu', (e) => {
                         e.preventDefault();
                         let selection = contents.window.getSelection();
                         let text = selection.toString().trim();
                         let range;

                         // Clever fallback: if no selection, try to auto-select word at right-click coordinates
                         if (!text && contents.document.caretRangeFromPoint) {
                             range = contents.document.caretRangeFromPoint(e.clientX, e.clientY);
                             if (range) {
                                 selection.removeAllRanges();
                                 selection.addRange(range);
                                 selection.modify("move", "backward", "word");
                                 selection.modify("extend", "forward", "word");
                                 text = selection.toString().trim();
                                 range = selection.getRangeAt(0);
                             }
                         } else if (text) {
                             range = selection.getRangeAt(0);
                         }

                         if (text && range) {
                             const cfiRange = new window.ePub.CFI(range, contents.cfiBase).toString();
                             const rect = viewerRef.current.getBoundingClientRect();
                             setContextMenu({ visible: true, x: e.clientX + rect.left, y: e.clientY + rect.top, text, cfiRange });
                         }
                     });
                     
                     // Close menu on click
                     contents.document.addEventListener('click', () => setContextMenu(null));

                     if (enabled && data[bookId]) applyWordWiseToContents(contents, data[bookId]);
                     if (autoEnabled) autoFetchWordWise(contents, bookId);
                  });

                  rendition.on('relocated', (location) => { savedLocationRef.current = location.start.cfi; });

                  // Removed the top-area tap listener that was causing abrupt menu closures
                  rendition.on('click', (e) => {
                     // The menu is now strictly controlled by the dedicated toggle button
                  });

                  rendition.on('touchstart', (e) => { rendition.touchStartX = e.changedTouches[0].screenX; });
                  rendition.on('touchend', (e) => {
                     const touchEndX = e.changedTouches[0].screenX;
                     if (rendition.touchStartX - touchEndX > 50) rendition.next();
                     if (rendition.touchStartX - touchEndX < -50) rendition.prev();
                  });
                  
                  rendition.on('keyup', (e) => {
                      if (e.key === 'ArrowLeft') rendition.prev();
                      if (e.key === 'ArrowRight') rendition.next();
                  });

                  // Context Menu Selection Saver (for long press)
                  rendition.on('selected', (cfiRange, contents) => {
                      const text = rendition.getRange(cfiRange).toString().trim();
                      if (text) {
                         lastSelectionRef.current = { cfiRange, text };
                         // We don't automatically clear selection here anymore to allow Context Menu interactions natively
                      }
                  });

                } catch (err) { console.error("EPUB render error:", err); }
              };
              renderBook();
            }
          }, [view, currentBook, epubLoaded, isLandscape, twoPageView]);

          // Dynamic Theme & Settings Apply
          useEffect(() => {
            if (renditionRef.current && currentBook?.format === 'epub' && currentBook?.fileData) {
              const { themes } = renditionRef.current;
              themes.fontSize(`${readerSettings.fontSize}%`);
              themes.font(readerSettings.fontFamily);
              themes.select(theme);
              
              // Force wordwise styling update
              const bg = theme === 'dark' ? '#1a1a1a' : theme === 'sepia' ? '#e4d8c8' : '#ffffff';
              const color = theme === 'dark' ? '#f4f4f4' : theme === 'sepia' ? '#5b4636' : '#111111';
              try {
                  renditionRef.current.getContents().forEach(c => {
                      c.document.documentElement.style.setProperty('--ww-bg', bg);
                      c.document.documentElement.style.setProperty('--ww-color', color);
                  });
              } catch(e){}
            }
          }, [readerSettings, theme, currentBook]);

          useEffect(() => {
            if (renditionRef.current && epubLoaded && currentBook?.fileData && renditionRef.current.location) {
               try { renditionRef.current.display(renditionRef.current.location.start.cfi); } catch (err) {}
            }
          }, [wordWiseEnabled]);

          const TopSystemBar = () => (
            <div className={`flex justify-between items-center px-4 py-1 text-xs font-semibold select-none z-50 ${currentTheme.bg} ${currentTheme.text} ${currentTheme.border} ${view === 'reader' && !menuOpen ? 'hidden' : 'border-b relative'}`}>
              <div className="flex space-x-2 items-center">
                <span>{time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
              </div>
              <div className="flex space-x-3 items-center">
                <Wifi size={14} />
                <div className="flex items-center space-x-1"><span>87%</span><Battery size={16} className="rotate-90" /></div>
              </div>
            </div>
          );

          const LibraryHeader = () => (
            <div className={`px-4 py-3 flex flex-col space-y-4 border-b ${currentTheme.bg} ${currentTheme.text} ${currentTheme.border}`}>
              <div className="flex justify-between items-center">
                <div className="flex space-x-6 text-xl font-bold font-serif tracking-wide">
                  <button onClick={() => setView('home')} className={view === 'home' ? 'border-b-2 border-current' : 'opacity-50'}>Home</button>
                  <button onClick={() => setView('library')} className={view === 'library' ? 'border-b-2 border-current' : 'opacity-50'}>Library</button>
                </div>
                <div className="flex space-x-4">
                  <button><Search size={22} /></button>
                  <button><Settings size={22} /></button>
                  <button><MoreVertical size={22} /></button>
                </div>
              </div>
              {view === 'library' && (
                <div className="flex justify-between items-center text-sm font-semibold">
                  <div className="flex space-x-4">
                    <button className={`flex items-center space-x-1 px-3 py-1 rounded-full ${theme === 'dark' ? 'bg-gray-800' : theme === 'sepia' ? 'bg-[#e4d8c8]' : 'bg-gray-200'}`}>All</button>
                    <button className="flex items-center space-x-1 px-3 py-1">Downloaded</button>
                  </div>
                  <div className="flex space-x-3 opacity-60">
                    <button onClick={() => setLibraryViewType('grid')} className={libraryViewType === 'grid' ? 'text-current opacity-100' : ''}><Grid size={20} /></button>
                    <button onClick={() => setLibraryViewType('list')} className={libraryViewType === 'list' ? 'text-current opacity-100' : ''}><ListIcon size={20} /></button>
                  </div>
                </div>
              )}
            </div>
          );

          return (
            <div className={`flex flex-col w-full h-screen overflow-hidden selection:bg-gray-400/30 ${currentTheme.bg} ${currentTheme.text}`} onClick={() => { if(contextMenu) setContextMenu(null) }}>
              <TopSystemBar />

              {view !== 'reader' ? (
                <>
                  <LibraryHeader />
                  <div className="flex-1 overflow-y-auto p-4">
                    <div className={libraryViewType === 'grid' ? "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6" : "flex flex-col space-y-4"}>
                      {books.map((book) => (
                        <div key={book.id} onClick={() => openBook(book)} className={`cursor-pointer group flex ${libraryViewType === 'list' ? 'flex-row space-x-4 items-center' : 'flex-col space-y-2'}`}>
                          <div className={`relative ${libraryViewType === 'grid' ? 'w-full aspect-[2/3]' : 'w-20 h-30 flex-shrink-0'}`}>
                            {book.cover ? (
                              <img src={book.cover} alt={book.title} className={`w-full h-full object-cover rounded shadow-sm border ${currentTheme.border} grayscale contrast-125`} />
                            ) : (
                              <div className={`w-full h-full rounded shadow-sm flex items-center justify-center p-2 text-center border ${currentTheme.border} ${theme === 'dark' ? 'bg-gray-800' : 'bg-gray-200'}`}>
                                <span className="font-serif text-sm font-bold truncate whitespace-normal">{book.title}</span>
                              </div>
                            )}
                            <div className="absolute bottom-0 left-0 right-0 bg-black/60 text-white text-[10px] px-2 py-1 flex justify-between">
                              <span>{book.progress}%</span>
                              <span className="uppercase font-bold">{book.format === 'epub' ? 'EPUB' : book.format.toUpperCase()}</span>
                            </div>
                          </div>
                          <div className={`flex flex-col ${libraryViewType === 'grid' ? 'text-center' : 'flex-1'}`}>
                            <span className={`font-bold font-serif leading-tight ${libraryViewType === 'grid' ? 'text-sm mt-1 truncate' : 'text-lg'}`}>{book.title}</span>
                            <span className="text-xs mt-1 opacity-70">{book.author}</span>
                          </div>
                        </div>
                      ))}
                    </div>
                    <button onClick={() => fileInputRef.current?.click()} className={`fixed bottom-6 right-6 p-4 rounded-full shadow-lg ${theme === 'dark' ? 'bg-white text-black' : 'bg-black text-white'}`}><Upload size={24} /></button>
                    <input type="file" ref={fileInputRef} onChange={handleFileUpload} accept=".epub,.pdf,.mobi,.azw3" className="hidden" />
                  </div>
                </>
              ) : (
                <div className="relative flex-1 flex flex-col w-full h-full overflow-hidden">
                  
                  {/* Context Menu */}
                  {contextMenu && (
                    <div 
                        className={`fixed border shadow-xl rounded py-1 z-50 flex flex-col min-w-[150px] ${currentTheme.menu} ${currentTheme.border}`}
                        style={{ top: Math.min(contextMenu.y, window.innerHeight - 150), left: Math.min(contextMenu.x, window.innerWidth - 150) }}
                    >
                        <button className={`px-4 py-2 text-left text-sm ${currentTheme.hover}`} onClick={() => handleContextMenuAction('copy')}>Copy "{contextMenu.text.substring(0, 15)}..."</button>
                        <button className={`px-4 py-2 text-left text-sm ${currentTheme.hover}`} onClick={() => handleContextMenuAction('bookmark')}>Bookmark Location</button>
                        <button className={`px-4 py-2 text-left text-sm ${currentTheme.hover}`} onClick={() => handleContextMenuAction('character')}>Add to Characters</button>
                    </div>
                  )}

                  {/* Notebook Overlay */}
                  {notebookOpen && (
                    <div className={`absolute inset-0 z-40 flex flex-col ${currentTheme.bg} overflow-hidden`}>
                        <div className={`flex items-center px-4 py-3 border-b ${currentTheme.border}`}>
                            <button onClick={() => setNotebookOpen(false)} className="mr-4"><ChevronLeft size={28} /></button>
                            <h2 className="text-xl font-serif font-bold flex-1">Notebook</h2>
                            <div className="flex space-x-2 border rounded p-1">
                                <button onClick={()=>setNotebookTab('bookmarks')} className={`px-3 py-1 rounded text-sm ${notebookTab === 'bookmarks' ? (theme==='dark'?'bg-gray-800':'bg-gray-200') : ''}`}>Bookmarks</button>
                                <button onClick={()=>setNotebookTab('characters')} className={`px-3 py-1 rounded text-sm ${notebookTab === 'characters' ? (theme==='dark'?'bg-gray-800':'bg-gray-200') : ''}`}>Characters</button>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4">
                            {notebookTab === 'bookmarks' && (
                                <div className="flex flex-col space-y-4">
                                    {(bookmarks[currentBook.id] || []).map((bm) => (
                                        <div key={bm.id} onClick={() => { renditionRef.current.display(bm.cfi); setNotebookOpen(false); }} className={`p-3 border rounded cursor-pointer ${currentTheme.border} ${currentTheme.hover}`}>
                                            <p className="font-serif italic opacity-90 mb-2">"{bm.text}"</p>
                                            <p className="text-xs opacity-50 font-bold uppercase">Location {bm.percentage}%</p>
                                        </div>
                                    ))}
                                    {!(bookmarks[currentBook.id] || []).length && <p className="opacity-50 text-center mt-10">No bookmarks saved yet.</p>}
                                </div>
                            )}
                            {notebookTab === 'characters' && (
                                <div className="flex flex-col md:flex-row h-full">
                                    <div className={`w-full md:w-1/3 flex flex-col space-y-2 border-b md:border-b-0 md:border-r ${currentTheme.border} pb-4 md:pb-0 md:pr-4`}>
                                        {(characters[currentBook.id] || []).map((char, idx) => (
                                            <button key={idx} onClick={() => searchCharacter(char)} className={`p-3 border rounded text-left font-serif font-bold ${currentTheme.border} ${currentTheme.hover}`}>
                                                {char}
                                            </button>
                                        ))}
                                        {!(characters[currentBook.id] || []).length && <p className="opacity-50">Right click a name to add characters.</p>}
                                    </div>
                                    <div className="w-full md:w-2/3 flex-1 overflow-y-auto md:pl-4 pt-4 md:pt-0">
                                        {isSearching && <p className="animate-pulse">Searching book...</p>}
                                        {searchResults && searchResults.map((res, i) => (
                                            <div key={i} onClick={() => { renditionRef.current.display(res.cfi); setNotebookOpen(false); }} className={`p-3 mb-3 border rounded cursor-pointer ${currentTheme.border} ${currentTheme.hover}`}>
                                                <p className="font-serif text-sm opacity-90" dangerouslySetInnerHTML={{__html: res.excerpt.replace(new RegExp(res.query, 'gi'), match => `<mark class="bg-yellow-200 text-black px-1">${match}</mark>`)}} />
                                            </div>
                                        ))}
                                        {searchResults && searchResults.length === 0 && !isSearching && <p className="opacity-50">No mentions found.</p>}
                                        {!searchResults && !isSearching && <p className="opacity-50 italic">Select a character to locate in text.</p>}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                  )}

                  {/* Reader Overlay Menu */}
                  <div className={`absolute top-0 left-0 right-0 z-30 transition-transform duration-300 ${menuOpen ? 'translate-y-0' : '-translate-y-full'}`}>
                    <div className={`${currentTheme.menu} ${currentTheme.border} border-b shadow-md relative z-10`}>
                      <div className="flex justify-between items-center px-4 py-3">
                        <button onClick={closeReader} className="flex items-center space-x-2 text-xl font-serif">
                          <ChevronLeft size={28} /><span>Library</span>
                        </button>
                        <div className="flex space-x-5 items-center">
                          <button onClick={() => setNotebookOpen(true)}><Notebook size={24} /></button>
                          <button onClick={() => setAaMenuOpen(!aaMenuOpen)} className="font-serif font-bold text-xl px-2 border border-current rounded">Aa</button>
                          <button><Search size={24} /></button>
                          <button><MoreVertical size={24} /></button>
                        </div>
                      </div>

                      {aaMenuOpen && (
                        <div className={`p-4 border-t ${currentTheme.border}`}>
                          <div className="flex flex-col space-y-6 max-w-md mx-auto">
                            {/* Theme Engine */}
                            <div className="flex justify-between items-center bg-black/5 dark:bg-white/5 p-1 rounded-lg">
                                <button onClick={() => setTheme('light')} className={`flex-1 py-2 flex justify-center rounded-md ${theme === 'light' ? 'bg-white shadow text-black' : 'opacity-60'}`}><Sun size={20}/></button>
                                <button onClick={() => setTheme('sepia')} className={`flex-1 py-2 flex justify-center rounded-md ${theme === 'sepia' ? 'bg-[#e4d8c8] shadow text-[#5b4636]' : 'opacity-60'}`}><Palette size={20}/></button>
                                <button onClick={() => setTheme('dark')} className={`flex-1 py-2 flex justify-center rounded-md ${theme === 'dark' ? 'bg-black shadow text-white' : 'opacity-60'}`}><Moon size={20}/></button>
                            </div>

                            <div className="flex items-center justify-between space-x-4">
                              <Type size={16} />
                              <input type="range" min="50" max="200" step="10" value={readerSettings.fontSize} onChange={(e) => setReaderSettings({...readerSettings, fontSize: e.target.value})} className="w-full h-1 bg-gray-300 rounded-lg appearance-none cursor-pointer" />
                              <Type size={24} />
                            </div>

                            <div className="grid grid-cols-2 gap-3">
                              <button onClick={() => setReaderSettings({...readerSettings, fontFamily: 'ui-serif, Georgia, serif'})} className={`p-2 border rounded font-serif ${readerSettings.fontFamily.includes('serif') ? 'ring-2 ring-current' : 'opacity-70'} ${currentTheme.border}`}>Bookerly</button>
                              <button onClick={() => setReaderSettings({...readerSettings, fontFamily: 'ui-sans-serif, system-ui, sans-serif'})} className={`p-2 border rounded font-sans ${readerSettings.fontFamily.includes('sans') ? 'ring-2 ring-current' : 'opacity-70'} ${currentTheme.border}`}>Amazon Ember</button>
                            </div>

                            {isLandscape && (
                              <div className={`pt-4 border-t ${currentTheme.border} flex justify-between`}>
                                <div className="flex items-center space-x-2"><Columns size={16} /><span className="font-bold text-sm">Two-Page View</span></div>
                                <button onClick={() => setTwoPageView(!twoPageView)} className={`w-11 h-6 rounded-full relative transition-colors ${twoPageView ? 'bg-blue-500' : 'bg-gray-400'}`}><div className={`w-4 h-4 rounded-full bg-white absolute top-1 transition-transform ${twoPageView ? 'translate-x-6' : 'translate-x-1'}`} /></button>
                              </div>
                            )}

                            <div className={`pt-4 border-t ${currentTheme.border}`}>
                              <div className="flex justify-between mb-3"><div className="flex items-center space-x-2"><BookOpen size={16} /><span className="font-bold text-sm">Show Word Wise</span></div><button onClick={() => setWordWiseEnabled(!wordWiseEnabled)} className={`w-11 h-6 rounded-full relative ${wordWiseEnabled ? 'bg-blue-500' : 'bg-gray-400'}`}><div className={`w-4 h-4 rounded-full bg-white absolute top-1 transition-transform ${wordWiseEnabled ? 'translate-x-6' : 'translate-x-1'}`} /></button></div>
                              <div className="flex justify-between mb-4"><div className="flex items-center space-x-2"><DownloadCloud size={16} /><span className="font-bold text-sm">Auto-Download Meanings</span></div><button onClick={() => setAutoWordWiseEnabled(!autoWordWiseEnabled)} className={`w-11 h-6 rounded-full relative ${autoWordWiseEnabled ? 'bg-blue-500' : 'bg-gray-400'}`}><div className={`w-4 h-4 rounded-full bg-white absolute top-1 transition-transform ${autoWordWiseEnabled ? 'translate-x-6' : 'translate-x-1'}`} /></button></div>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                    
                    {/* Persistent Toggle Button */}
                    <button 
                       onClick={(e) => { e.stopPropagation(); setMenuOpen(!menuOpen); if(menuOpen) setAaMenuOpen(false); }}
                       className={`absolute top-full left-1/2 -translate-x-1/2 w-16 h-7 flex items-center justify-center rounded-b-xl shadow-md border-b border-l border-r ${currentTheme.menu} ${currentTheme.border} cursor-pointer z-0 focus:outline-none hover:opacity-90`}
                    >
                       {menuOpen ? <ChevronUp size={20} /> : <ChevronDown size={20} />}
                    </button>
                  </div>
                  
                  <div className="flex-1 w-full h-full relative z-10 pointer-events-none">
                    {currentBook?.format === 'epub' && currentBook?.fileData ? (
                      <div ref={viewerRef} className="w-full h-full absolute inset-0 pointer-events-auto" />
                    ) : (
                      currentBook && <div className="flex flex-col items-center justify-center h-full text-center p-8 pointer-events-auto"><Settings size={48} className="animate-spin-slow mb-4 opacity-50" /><h2 className="text-2xl font-serif font-bold">Unsupported Format</h2><p className="opacity-70 mt-2">Only EPUB files can be fully simulated. Please convert your file.</p><button onClick={closeReader} className="mt-8 px-6 py-2 border-2 border-current rounded-full font-bold">Return to Library</button></div>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
